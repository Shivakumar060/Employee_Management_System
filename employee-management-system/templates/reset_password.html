{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card glass-card border-0 shadow-lg rounded-5 animate-slide-up">
            <div class="card-body p-5 text-center">
                <div class="logo-circle mx-auto mb-4 bg-danger-gradient shadow-lg"><i class="fa-solid fa-key"></i></div>
                <h3 class="fw-bold text-primary-gradient mb-4">Reset Protocol</h3>
                <form method="POST" class="needs-validation" novalidate>
                    <div class="form-floating mb-3 shadow-sm-inset glass-input rounded-4">
                        <input type="text" class="form-control border-0 bg-transparent text-dark" id="username" name="username" placeholder="Username" required>
                        <label for="username">Confirm Identity (Username)</label>
                    </div>
                    <div class="form-floating mb-4 shadow-sm-inset glass-input rounded-4">
                        <input type="password" class="form-control border-0 bg-transparent text-dark" id="password" name="password" placeholder="New Password" required>
                        <label for="password">Create New Passphrase</label>
                    </div>
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary-gradient rounded-pill py-3 fw-bold shadow-md">Apply Update</button>
                    </div>
                    <a href="{{ url_for('login') }}" class="text-muted small text-decoration-none"><i class="fa-solid fa-arrow-left me-2"></i>Return to Portal</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
