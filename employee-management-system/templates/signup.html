{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card glass-card border-0 shadow-lg rounded-5 animate-slide-up">
            <div class="card-body p-5">
                <div class="text-center mb-5">
                    <div class="logo-circle mx-auto mb-4 scale-up-hover bg-primary-gradient"><i class="fa-solid fa-user-plus"></i></div>
                    <h3 class="fw-bold text-primary-gradient">New Registration</h3>
                    <p class="text-muted small">ApexCorp Operator Enrolment</p>
                </div>
                <form method="POST" class="needs-validation" novalidate>
                    <div class="form-floating mb-3 shadow-sm-inset glass-input rounded-4 text-dark">
                        <input type="text" class="form-control border-0 bg-transparent text-dark" id="username" name="username" placeholder="Username" required>
                        <label for="username">Choose Unique Username</label>
                    </div>
                    <div class="form-floating mb-4 shadow-sm-inset glass-input rounded-4 text-dark">
                        <input type="password" class="form-control border-0 bg-transparent text-dark" id="password" name="password" placeholder="Password" required>
                        <label for="password">Create Secure Passphrase</label>
                    </div>
                    <div class="d-grid mb-4">
                        <button type="submit" class="btn btn-primary-gradient rounded-pill py-3 fw-bold shadow-md">Complete Registration</button>
                    </div>
                    <div class="text-center">
                        <p class="mb-0 text-muted small">Existing identity? <a href="{{ url_for('login') }}" class="text-primary text-decoration-none fw-bold">Sign In Now</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
